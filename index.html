<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <div class="row row-rtl">

            </div>
        </div>

        <div class="row row-ltr">
            <div class="track">
                <img src="17.png" alt="" data-id="17"><img src="18.png" alt="" data-id="18"><img src="19.png" alt="" data-id="19"><img src="20.png" alt="" data-id="20"><img src="21.png" alt="" data-id="21"><img src="22.png" alt="" data-id="22"><img src="23.png" alt="" data-id="23"><img src="24.png" alt="" data-id="24">
                <img src="17.png" alt="" data-id="17"><img src="18.png" alt="" data-id="18"><img src="19.png" alt="" data-id="19"><img src="20.png" alt="" data-id="20"><img src="21.png" alt="" data-id="21"><img src="22.png" alt="" data-id="22"><img src="23.png" alt="" data-id="23"><img src="24.png" alt="" data-id="24">

        <div class="row row-rtl">
            <div class="track">
                <img src="25.png" alt="" data-id="25"><img src="26.png" alt="" data-id="26"><img src="27.png" alt="" data-id="27"><img src="28.png" alt="" data-id="28"><img src="29.png" alt="" data-id="29"><img src="30.png" alt="" data-id="30"><img src="31.png" alt="" data-id="31"><img src="32.png" alt="" data-id="32">
                <img src="25.png" alt="" data-id="25"><img src="26.png" alt="" data-id="26"><img src="27.png" alt="" data-id="27"><img src="28.png" alt="" data-id="28"><img src="29.png" alt="" data-id="29"><img src="30.png" alt="" data-id="30"><img src="31.png" alt="" data-id="31"><img src="32.png" alt="" data-id="32">

        <div class="close-btn" id="closeBtn">&times;</div>
        <img class="animated-img" id="animatedImg" src="" alt="">
        <div class="text-side" id="textSide">
            <textarea placeholder="Write text here..."></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
